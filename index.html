<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推薦点計算ツール</title>
<style>
/* CSSは前回の構成を維持 */
:root { --base-radius: 8px; --green-1: #f8fffa; --green-2: #f0fdf4; --green-3: #d8fde5; --green-4: #befad5; --green-6: #7eeaae; --green-7: #4edb95; --green-8: #2ac17d; --green-9: #3fcf8a; --green-10: #2fc47f; --green-11: #008145; --green-12: #004523; --green-a2: #00dd440f; }
* { font-family: "IBM Plex Sans JP", sans-serif; }
body { background-color: var(--green-1); padding: 20px; }
.calculator-wrap { padding: 20px; background: var(--green-1); border: 1px solid var(--green-6); border-radius: var(--base-radius); max-width: 800px; margin: 0 auto; box-shadow: 0 4px 12px var(--green-a2); }
.calc-row { display: flex; flex-wrap: wrap; gap: 15px; margin-bottom: 20px; }
.calc-box { background: var(--green-2); border: 1px solid var(--green-4); padding: 15px; border-radius: var(--base-radius); flex: 1; min-width: 280px; }
.input-group { margin-bottom: 10px; }
.input-group label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--green-10); }
.input-group input, .input-group select { width: 100%; padding: 10px; border: 2px solid var(--green-6); border-radius: var(--base-radius); }
.result-text { font-weight: bold; color: var(--green-11); display: flex; justify-content: space-between; align-items: center; }
.res-num { background: var(--green-1); padding: 4px 12px; border: 1px solid var(--green-6); border-radius: var(--base-radius); min-width: 100px; text-align: right; }
.total-section { background: var(--green-2); padding: 20px; border-radius: var(--base-radius); border: 2px solid var(--green-6); margin-top: 10px; }
.result-equation { text-align: center; font-weight: bold; margin-top: 10px; background: var(--green-1); padding: 10px; border-radius: var(--base-radius); border: 1px dashed var(--green-6); }
.final-result { font-size: 1.2em; text-align: center; border: 2px solid var(--green-11); padding: 15px; margin-top: 15px; border-radius: var(--base-radius); }
</style>
</head>
<body>

<div class="calculator-wrap">
  <h2>推薦点シミュレーター</h2>

  <div class="calc-row">
    <div class="calc-box">
      <h3>【高1】</h3>
      <div class="input-group"><label>学年末平均</label><input type="number" id="score1" step="0.01"></div>
      <div class="result-text"><span>× 9.9 ＝ (ア)</span><span id="res_a" class="res-num">0.00</span></div>
    </div>
    <div class="calc-box">
      <h3>【高2】</h3>
      <div class="input-group"><label>学年末平均</label><input type="number" id="score2" step="0.01"></div>
      <div class="result-text"><span>× 12.4 ＝ (イ)</span><span id="res_i" class="res-num">0.00</span></div>
    </div>
  </div>

  <div class="calc-box" style="margin-bottom:20px;">
    <h3>【高大連携・探究】</h3>
    <div style="display:flex; gap:10px;">
      <div class="input-group" style="flex:1;"><label>高大連携 (ウ)</label><select id="score_collab_2"><option value="40">A(40)</option><option value="32">B(32)</option><option value="24">C(24)</option><option value="16">D(16)</option><option value="0" selected>E(0)</option></select></div>
      <div class="input-group" style="flex:1;"><label>探究選択 (エ)</label><select id="score_explore_2"><option value="40">A(40)</option><option value="32">B(32)</option><option value="24">C(24)</option><option value="16">D(16)</option><option value="0" selected>E(0)</option></select></div>
    </div>
  </div>

  <div class="calc-box">
    <h3>【高3 1学期】</h3>
    <div class="input-group"><label>1学期平均</label><input type="number" id="score3" step="0.01"></div>
    <div class="result-text"><span>× 7.75 ＝ (オ)</span><span id="res_o" class="res-num">0.00</span></div>
  </div>

  <div class="total-section">
    <h3>目標設定</h3>
    <div class="input-group">
      <label>目標推薦点</label>
      <select id="target_point">
        <option value="60">60点（基準点 2376）</option>
        <option value="70">70点（基準点 2772）</option>
      </select>
    </div>
    <div class="result-equation">
      必要点数 - (ア+イ+ウ+エ+オ) = 残り点数
    </div>
    <div class="final-result">
      今後必要な平均点: <span id="res_goal_avg" style="color:var(--green-11);">0.00</span> 点
    </div>
  </div>
</div>

<script>
document.querySelectorAll('input, select').forEach(el => el.addEventListener('input', calc));
function calc() {
  const a = (Number(document.getElementById('score1').value) || 0) * 9.9;
  const i = (Number(document.getElementById('score2').value) || 0) * 12.4;
  const u = Number(document.getElementById('score_collab_2').value);
  const e = Number(document.getElementById('score_explore_2').value);
  const o = (Number(document.getElementById('score3').value) || 0) * 7.75;
  const target = Number(document.getElementById('target_point').value);
  
  const base = (target === 60) ? 2376 : 2772;
  const total = a + i + u + e + o;
  const goal = (base - total) / 8.75;

  document.getElementById('res_a').textContent = a.toFixed(2);
  document.getElementById('res_i').textContent = i.toFixed(2);
  document.getElementById('res_o').textContent = o.toFixed(2);
  document.getElementById('res_goal_avg').textContent = Math.max(0, goal).toFixed(2);
}
</script>
</body>
</html>
